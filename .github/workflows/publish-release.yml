name: Publish DevCloud release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == *-beta.* ]] && [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]{8}\.[0-9]+$ ]]; then
            echo "Beta versions must use MAJOR.MINOR.PATCH-beta.YYYYMMDD.N" >&2
            exit 1
          fi
          if [[ "$version" != *-* ]] && [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable versions must use MAJOR.MINOR.PATCH with no date suffix" >&2
            exit 1
          fi
          awk -v heading="## $version" '
            $0 == heading { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            printf 'See the public changelog for this DevCloud release.\n' > release-notes.md
          fi
          release_type="--latest"
          major="${version%%.*}"
          if [[ "$major" =~ ^[0-9]+$ ]] && (( major >= 1 )) && [[ "$version" == *-* ]]; then
            release_type="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "DevCloud $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "$release_type" \
            devcloud-* \
            release-manifest.txt \
            release-manifest.txt.sig
